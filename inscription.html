<!doctype html> 
<html lang="fr"> 
	<head> 
		<meta charset="UTF-8">
    <title>LifePath</title>
    <link rel="stylesheet" href="style_formulaire.css">
    <link rel="icon" type="image/png" href="images/personnagesansfondombre.png">
	</head> 
	<body>
		<header class="Connect_subscribe">
			<img class="header_img" src="images/Logo_bg_arrondi.png" alt="Logo LifePath">
			<h1 class="tittle"><b>LifePath</b></h1>
    	</header>
 
		<main>
			<section>
	   
				<h2>Inscription</h2>
				<article>

					<div class="container">
            				<div class="toggle-container" id="toggle">
                			<div class="toggle-slider"></div>
                			<div class="toggle-option">Particulier</div>
                			<div class="toggle-option">Entreprise</div>
            				</div>
        <!-- Formulaire Particulier -->
        				<div id="form-particulier" class="form-section active">
            				<h2>Inscription Particulier</h2>

            				<form>

								<div class="form-group">
									<label>Statut*</label><br>
									<input class="btn_color" type="radio" name="statut" required> Étudiant <br>
									<input class="btn_color" type="radio" name="statut" required> Pilote
									<br><br>
								</div>

                				<div class="form-group">
                    				<label>Nom*</label><br>
                    				<input type="text" name="nom" size="25" placeholder="Dupont de Ligonnès" required>
                				</div>

                				<div class="form-group">
                    				<label>Prénom*</label><br>
                    				<input type="text" name="prenom" size="25" placeholder="Titouan" required>
                				</div>

								<div class="form-group">
                    				<label>Classe*</label><br>
                    				<input type="text" size="25" placeholder="CPI-A2 Informatique" required>
                				</div>

								<div class="form-group">
                    				<label>Pilote</label><br>
                    				<select name="pilote">
										<option value="">Sélectionnez un pilote</option>
										<option value="pilote1">Jeremy GALLET</option>
										<option value="pilote2">Gilles-Alexis RENAUT</option>
										<option value="pilote3">Jean-Pascal DUFONTEL</option>
									</select>
                				</div>

                				<div class="form-group">
                    				<label for="email">Email*</label><br>
                    				<input type="email" size="25" placeholder="turlututu@viacesi.fr" required>
                				</div>

                				<div class="form-group">
                    				<label>Mot de passe*</label><br>
                    				<input type="password" size="25" placeholder="********" required>
                				</div>

                				<div class="form-group">
                    				<label>Confirmation</label><br>
                    				<input type="password" size="25" placeholder="********" required>
                				</div>
            				</form>
        				</div>
        <!-- Formulaire Entreprise -->
        				<div id="form-entreprise" class="form-section">
            				<h2>Inscription Entreprise</h2>

            				<form>
                				<div class="form-group">
                    				<label for="societe">Nom de la société*</label><br>
                    				<input type="text" id="societe" name="societe" placeholder="Game Freak" required>
                				</div>

                				<div class="form-group">
                    				<label for="email-pro">Email*</label><br>
                    				<input type="email" id="email-pro" name="email-pro" placeholder="contact@gamefreak.fr" required>
                				</div>

                				<div class="form-group">
                    				<label for="telephone-pro">Téléphone*</label><br>
                    				<input type="tel" name="telephone-pro" placeholder="01 23 45 67 89" required>
                				</div>

								<div class="form-group">
									<label for="password-pro">Mot de passe*</label><br>
									<input type="password" id="password-pro" name="password-pro" placeholder="********" required>
								</div>

								<div class="form-group">
									<label for="password-pro-confirm">Confirmation*</label><br>
									<input type="password" id="password-pro-confirm" name="password-pro-confirm" placeholder="********" required>
								</div>
            				</form>
        				</div>
    				</div>

					<input class="btn_color" type="checkbox" required> J'accepte les <a href="mentions-legales.html">Conditions d'utilisations et la Politique de confidentialité</a></input>
					<br><br>

					<button class="submit" name="submit" type="submit">Inscription</button>

					<p>Déjà un compte ? <a href="connexion.html">Connectez-vous</a></p>		
				</article>
			</section>
		</main>
		
		<script src="script_form.js"></script>

	</body> 
</html>

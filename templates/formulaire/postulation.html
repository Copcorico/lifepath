<!-- Modal de Postulation -->
<div id="postulateModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closePostulateModal()">&times;</span>
        <h2>Postuler à cette offre</h2>
        
        <form id="postulateForm" enctype="multipart/form-data">
            <input type="hidden" id="offerId" name="id_offre" value="">
            <input type="hidden" id="studentId" name="id_etudiant" value="">

            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" required>
            </div>

            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" required>
            </div>

            <div class="form-group">
                <label for="email">Adresse mail :</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telephone">Téléphone :</label>
                <input type="tel" id="telephone" name="telephone" required>
            </div>

            <div class="form-group">
                <label for="cv">CV (PDF uniquement, max 5 MB) :</label>
                <input type="file" id="cv" name="cv" accept=".pdf" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Envoyer ma candidature</button>
                <button type="button" class="btn-cancel" onclick="closePostulateModal()">Annuler</button>
            </div>
        </form>

        <div id="postulateMessage" class="message" style="display: none;"></div>
    </div>
</div>

<style>
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.4);
}

.modal-content {
    background-color: white;
    margin: 10% auto;
    padding: 30px;
    border: 1px solid #888;
    width: 80%;
    max-width: 500px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

.close {
    color: #aaa;
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
}

.close:hover,
.close:focus {
    color: black;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    box-sizing: border-box;
}

.form-actions {
    display: flex;
    gap: 10px;
    justify-content: space-between;
}

.btn-submit, .btn-cancel {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
}

.btn-submit {
    background-color: #007bff;
    color: white;
    flex: 1;
}

.btn-submit:hover {
    background-color: #0056b3;
}

.btn-cancel {
    background-color: #6c757d;
    color: white;
    flex: 1;
}

.btn-cancel:hover {
    background-color: #545b62;
}

.message {
    margin-top: 15px;
    padding: 10px;
    border-radius: 4px;
    text-align: center;
    font-weight: bold;
}

.message.success {
    background-color: #d4edda;
    color: #155724;
}

.message.error {
    background-color: #f8d7da;
    color: #721c24;
}
</style>

<script>
function openPostulateModal(offerId, studentId) {
    document.getElementById('offerId').value = offerId;
    document.getElementById('studentId').value = studentId;
    document.getElementById('postulateForm').reset();
    document.getElementById('postulateMessage').style.display = 'none';
    document.getElementById('postulateModal').style.display = 'block';
}

function closePostulateModal() {
    document.getElementById('postulateModal').style.display = 'none';
}

window.onclick = function(event) {
    const modal = document.getElementById('postulateModal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}

document.getElementById('postulateForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    try {
        const response = await fetch('/candidature/postulate', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();
        const messageDiv = document.getElementById('postulateMessage');

        if (response.ok) {
            messageDiv.className = 'message success';
            messageDiv.textContent = data.message;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                closePostulateModal();
            }, 2000);
        } else {
            messageDiv.className = 'message error';
            messageDiv.textContent = data.error;
            messageDiv.style.display = 'block';
        }
    } catch (error) {
        const messageDiv = document.getElementById('postulateMessage');
        messageDiv.className = 'message error';
        messageDiv.textContent = 'Erreur lors de l\'envoi de la candidature';
        messageDiv.style.display = 'block';
    }
});
</script>
